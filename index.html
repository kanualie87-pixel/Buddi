<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUDDI | AI Fitness Assistant</title>
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        :root {
            --primary: #00d2ff;
            --dark: #050505;
            --card-bg: #111111;
            --text: #e0e0e0;
            --female-accent: #ff4d94;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--dark);
            color: var(--text);
            margin: 0;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(to bottom, #000, #111);
            border-bottom: 1px solid #222;
        }

        .container {
            max-width: 1100px;
            margin: -30px auto 50px;
            padding: 0 20px;
        }

        .step-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            text-align: center;
            border: 1px solid #222;
        }

        .hidden { display: none; }

        .profile-grid {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .profile-card {
            background: #000;
            border: 1px solid #333;
            padding: 40px;
            width: 200px;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 8px;
        }

        .profile-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .profile-card i { width: 50px; height: 50px; margin-bottom: 15px; color: var(--primary); }

        .goal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .goal-card {
            background: #000;
            border: 1px solid #222;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 8px;
            overflow: hidden;
            text-align: left;
        }

        .goal-card:hover { border-color: var(--primary); transform: scale(1.02); }

        .goal-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .goal-info { padding: 15px; }

        .btn {
            padding: 12px 25px;
            background: transparent;
            color: white;
            border: 1px solid #444;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 20px;
        }

        .btn:hover { background: white; color: black; }

        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 12px; border-bottom: 1px solid #222; text-align: left; }
        th { color: var(--primary); font-size: 0.8em; }

        .dynamic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
            text-align: left;
        }

        .dynamic-box { background: #000; padding: 20px; border: 1px solid #222; border-radius: 8px; }
        .dynamic-box h4 { color: var(--primary); margin-top: 0; border-bottom: 1px solid #222; padding-bottom: 10px; }
    </style>
</head>
<body id="main-body">

<header>
    <h1 style="letter-spacing: 12px; margin:0;">BUDDI</h1>
    <p style="opacity: 0.5;">YOUR BODY BUILDING ASSISTANT</p>
</header>

<div class="container">
    <div id="step-1" class="step-card">
        <h3>Select Your Genders</h3>
        <div class="profile-grid">
            <div class="profile-card" onclick="startApp('male')">
                <i data-feather="user"></i>
                <div>MALE</div>
            </div>
            <div class="profile-card" onclick="startApp('female')">
                <i data-feather="user-plus" style="color:var(--female-accent)"></i>
                <div>FEMALE</div>
            </div>
        </div>
    </div>

    <div id="step-2" class="step-card hidden">
        <h3 id="goal-header">Choose Your Path</h3>
        <div class="goal-grid" id="goal-container"></div>
        <button class="btn" onclick="location.reload()">← Back Home</button>
    </div>

    <div id="step-3" class="step-card hidden">
        <div id="roadmap-content"></div>
        <button class="btn" onclick="backToStep2()">← Back to Plans</button>
    </div>
</div>

<script>
    const plansDB = {
        male: [
            { 
                name: "Mass Monster", 
                img: "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=600",
                nutrition: "Surplus: High calorie intake. Base of 300g+ carbs (Rice/Yam). 4 Whole eggs daily.",
                tip: "Heavy sets of 6-8 reps. Prioritize the Barbell Squat.",
                guide: "Focus on 'Time Under Tension'. 3-second negative on every lift."
            },
            { 
                name: "Aesthetic V-Taper", 
                img: "https://images.unsplash.com/photo-1583454110551-21f2fa2adfcd?auto=format&fit=crop&q=80&w=600",
                nutrition: "Maintenance: High protein, medium carbs. High fiber via vegetables.",
                tip: "Hammer the lateral delts and upper back. Pull-ups are non-negotiable.",
                guide: "Keep your waist tight by avoiding excessive 'dirty' bulking."
            },
            { 
                name: "Powerlifter", 
                img: "https://images.unsplash.com/photo-1541534741688-6078c65b5a33?auto=format&fit=crop&q=80&w=600",
                nutrition: "Strength Fuel: High sodium and electrolyte balance. Carbs before every session.",
                tip: "Pause at the bottom of the bench. Explode on the way up.",
                guide: "Lower volume, higher intensity. Rest 5 minutes between main sets."
            },
            { 
                name: "Lean Warrior", 
                img: "https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?auto=format&fit=crop&q=80&w=600",
                nutrition: "Deficit: Focus on lean protein (Chicken/Fish). Fasted cardio for 20 mins.",
                tip: "Keep rest intervals under 45 seconds to maintain high heart rate.",
                guide: "Switch to high-rep ranges (15-20) to maintain definition while cutting."
            },
            { 
                name: "Calisthenics King", 
                img: "https://images.unsplash.com/photo-1526506118085-60ce8714f8c5?auto=format&fit=crop&q=80&w=600",
                nutrition: "Clean Fuel: Stay light. Focus on healthy fats (Peanuts/Avocado) for long energy.",
                tip: "Master the pull-up and muscle-up. Strength-to-weight ratio is key.",
                guide: "Incorporate static holds like Planks and L-Sits every day."
            },
            { 
                name: "Hybrid Athlete", 
                img: "https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&q=80&w=600",
                nutrition: "High Carb: You need fuel for lifting AND running. Pasta and Cassava are vital.",
                tip: "Never skip the 5km run. It builds the heart that powers the lifts.",
                guide: "Separate your cardio and lifting by at least 6 hours for recovery."
            }
        ],
        female: [
            { 
                name: "Bikini Pro", 
                img: "https://images.unsplash.com/photo-1518310383802-640c2de311b2?auto=format&fit=crop&q=80&w=600",
                nutrition: "Toning: Lean fish and high greens. Limit sugars entirely.",
                tip: "High volume glute isolation. Hip thrusts are your primary weapon.",
                guide: "Focus on the mind-muscle connection rather than just heavy weight."
            },
            { 
                name: "Wellness Queen", 
                img: "https://images.unsplash.com/photo-1594381898411-846e7d193883?auto=format&fit=crop&q=80&w=600",
                nutrition: "Building: High protein. Don't fear healthy fats like coconut oil.",
                tip: "Heavy compound leg days 3x per week. Build the base.",
                guide: "Stretching and foam rolling are essential for Wellness mobility."
            },
            { 
                name: "Lean Strength", 
                img: "https://images.unsplash.com/photo-1590239068531-9721666e4a83?auto=format&fit=crop&q=80&w=600",
                nutrition: "Balanced: Moderate carbs. Eat complex grains like brown rice.",
                tip: "Kettlebell swings and deadlifts. Functional strength creates the look.",
                guide: "Aim for 10k steps daily on top of your lifting routine."
            },
            { 
                name: "Cross-Fit Star", 
                img: "https://images.unsplash.com/photo-1517963879433-6ad2b056d712?auto=format&fit=crop&q=80&w=600",
                nutrition: "Performance: Fast-acting carbs before WODs. Bananas and honey.",
                tip: "Work on your snatch and clean-and-jerk technique daily.",
                guide: "Workouts should be high intensity. Race the clock."
            },
            { 
                name: "Sculpt & Glow", 
                img: "https://images.unsplash.com/photo-1574680096145-d05b474e2155?auto=format&fit=crop&q=80&w=600",
                nutrition: "Vitality: Focus on antioxidants and lean protein. Plenty of local fruit.",
                tip: "Use light dumbbells and high reps (30+) to sculpt the arms.",
                guide: "Incorporate 15 mins of Yoga after every session for long muscles."
            },
            { 
                name: "Endurance Elite", 
                img: "https://images.unsplash.com/photo-1593079831268-3381b0db4a77?auto=format&fit=crop&q=80&w=600",
                nutrition: "Fueling: Carb-loading before long sessions. Oats are essential.",
                tip: "Keep the heart rate in Zone 2 for fat-burning efficiency.",
                guide: "Hydrate with salt-water mix to replace electrolytes lost in heat."
            }
        ]
    };

    let selectedGender = "";

    function startApp(gender) {
        selectedGender = gender;
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
        
        const container = document.getElementById('goal-container');
        container.innerHTML = "";
        
        plansDB[gender].forEach((plan, index) => {
            container.innerHTML += `
                <div class="goal-card" onclick="openRoadmap(${index})">
                    <img src="${plan.img}" class="goal-img" alt="${plan.name}">
                    <div class="goal-info">
                        <strong>${plan.name}</strong>
                    </div>
                </div>
            `;
        });
        feather.replace();
    }

    function openRoadmap(idx) {
        const item = plansDB[selectedGender][idx];
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');

        document.getElementById('roadmap-content').innerHTML = `
            <h2 style="color:var(--primary); margin-bottom:5px;">${item.name.toUpperCase()}</h2>
            <p style="opacity:0.7; margin-top:0;">7-Day Strategic Roadmap</p>
            
            <table>
                <tr><th>Day</th><th>Training Split</th></tr>
                <tr><td>Day 1</td><td>Chest, Shoulders & Triceps (Push)</td></tr>
                <tr><td>Day 2</td><td>Back & Biceps (Pull)</td></tr>
                <tr><td>Day 3</td><td>Legs & Abs (Lower)</td></tr>
                <tr><td>Day 4</td><td>Active Recovery (Light Cardio)</td></tr>
                <tr><td>Day 5</td><td>Upper Body Strength (Combined)</td></tr>
                <tr><td>Day 6</td><td>Lower Body Volume (Isolation)</td></tr>
                <tr><td>Day 7</td><td>Full Rest & Mobility</td></tr>
            </table>

            <div class="dynamic-grid">
                <div class="dynamic-box">
                    <h4>Nutritional Protocol</h4>
                    <p>${item.nutrition}</p>
                </div>
                <div class="dynamic-box">
                    <h4>Coach's Action Tip</h4>
                    <p>${item.tip}</p>
                </div>
                <div class="dynamic-box">
                    <h4>Training Methodology</h4>
                    <p>${item.guide}</p>
                </div>
                <div class="dynamic-box">
                    <h4>Local Makeni Advice</h4>
                    <p>Protein sourcing: Focus on dried fish and affordable groundnuts from the clock tower market for high protein at low cost.</p>
                </div>
            </div>
        `;
    }

    function backToStep2() {
        document.getElementById('step-3').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    }

    // Initialize Feather Icons
    feather.replace();
</script>

</body>
</html>
